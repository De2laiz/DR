<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фото 📸</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
}

img{
width:100%;
border-radius:15px;
margin-top:15px;
}

a{
display:block;
margin-top:20px;
font-size:18px;
text-decoration:none;
color:#e91e63;
}

button{
width:100%;
padding:18px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
cursor:pointer;
}
/* сердечки */

@keyframes heartFloat{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(-50%,-120px) scale(1.5);
opacity:0;
}
}

.next-btn{
width:auto;
padding:12px 22px;
font-size:16px;
border-radius:25px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Смотрю на такую красотку и глаз не нарадуется😍😍😍</h1>

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">


<button class="next-btn" onclick="location.href='surprise.html'">Финал😉❤️</button>

</div>

<script>

document.addEventListener("click", function(e){

let heart = document.createElement("div");
heart.innerHTML = "❤️";

heart.style.position = "fixed";
heart.style.left = e.clientX + "px";
heart.style.top = e.clientY + "px";
heart.style.fontSize = "30px";
heart.style.pointerEvents = "none";
heart.style.animation = "heartFloat 1s ease-out forwards";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

</script>

</body>
</html>

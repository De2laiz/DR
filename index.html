<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши моменты 📸</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
margin-bottom:20px;
}

.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
gap:15px;
padding-bottom:10px;
}

.slide{
min-width:100%;
scroll-snap-align:center;
}

.slide img,
.slide video{
width:100%;
border-radius:15px;
}

.slider::-webkit-scrollbar{
display:none;
}

button{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
font-size:17px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Наши моменты ❤️</h1>

<div class="slider" id="slider"></div>

<button onclick="location.href='final.html'">Дальше →</button>

</div>

<script>

const slider = document.getElementById("slider");

/* 118 фото */

for(let i=1;i<=118;i++){

let slide=document.createElement("div");
slide.className="slide";

let img=document.createElement("img");
img.src="photo"+i+".jpg";

slide.appendChild(img);
slider.appendChild(slide);

}

/* 29 видео */

for(let i=1;i<=28;i++){

let slide=document.createElement("div");
slide.className="slide";

let video=document.createElement("video");
video.controls=true;

let source=document.createElement("source");
source.src="video"+i+".mp4";
source.type="video/mp4";

video.appendChild(source);
slide.appendChild(video);
slider.appendChild(slide);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши моменты 📸</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
margin-bottom:20px;
}

.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
gap:15px;
padding-bottom:10px;
}

.slide{
min-width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide img,
.slide video{
width:100%;
height:auto;
max-height:80vh;
object-fit:contain;
border-radius:15px;
}

.slider::-webkit-scrollbar{
display:none;
}

button{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
font-size:17px;
cursor:pointer;
}

#videoPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

.popup-content{
width:90%;
max-width:500px;
background:white;
padding:20px;
border-radius:20px;
text-align:center;
}

.popup-content video{
width:100%;
border-radius:15px;
}

.popup-content button{
margin-top:15px;
padding:15px;
width:100%;
border:none;
border-radius:25px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

#videoModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.videoBox{
width:90%;
max-width:500px;
}

.videoBox video{
width:100%;
border-radius:15px;
}

/* звездочки */

.star{
position:fixed;
top:-10px;
font-size:18px;
animation:starFall linear forwards;
pointer-events:none;
}

@keyframes starFall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<div id="videoPopup">

<div class="popup-content">

<video id="startVideo" controls autoplay>
<source src="start.mp4" type="video/mp4">
</video>

<button onclick="closePopup()">Поздравляю 🌸</button>

</div>

</div>

<body>

<div class="container">

<h1>Наши моменты ❤️</h1>

<div class="slider" id="slider"></div>

<button onclick="openVideo()">Сюрприз ✨</button>

</div>

<div id="videoModal">

<div class="videoBox">
<video id="surpriseVideo" controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

</div>

<script>

const slider = document.getElementById("slider");

/* 118 фото */

for(let i=1;i<=118;i++){

let slide=document.createElement("div");
slide.className="slide";

let img=document.createElement("img");
img.src="photo"+i+".jpg";

slide.appendChild(img);
slider.appendChild(slide);

}

/* 29 видео */

for(let i=1;i<=28;i++){

let slide=document.createElement("div");
slide.className="slide";

let video=document.createElement("video");
video.controls=true;

let source=document.createElement("source");
source.src="video"+i+".mp4";
source.type="video/mp4";

video.appendChild(source);
slide.appendChild(video);
slider.appendChild(slide);

}

function closePopup(){

document.getElementById("videoPopup").style.display="none";

let video=document.getElementById("startVideo");
video.pause();

}

function openVideo(){

let modal=document.getElementById("videoModal");
modal.style.display="flex";

document.getElementById("surpriseVideo").play();

/* звездочки */

for(let i=0;i<80;i++){

let star=document.createElement("div");
star.className="star";
star.innerHTML="⭐";

star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(star);

setTimeout(()=>{
star.remove();
},4000);

}

}

/* закрытие при клике на фон */

document.getElementById("videoModal").addEventListener("click",function(e){

if(e.target.id==="videoModal"){

this.style.display="none";

document.getElementById("surpriseVideo").pause();

}

});

</script>

</body>
</html>
